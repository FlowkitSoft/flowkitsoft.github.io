<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowKit - Tools Collection</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23161b22'/%3E%3Ctext x='50' y='72' font-size='55' text-anchor='middle' fill='%2300d4ff'%3E⎇%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-code-branch"></i>
                <span>FlowKit</span>
                <span class="logo-badge">Tools Suite</span>
            </div>
            <div class="nav-search">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Cari tools...">
            </div>
            <div class="nav-stats">
                <i class="fas fa-toolbox"></i>
                <span id="toolsCount">0</span>
                <span>tools</span>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-content">
            <h1>Tools <span>Collection</span></h1>
            <p>Koleksi utility tools untuk produktivitas dan development</p>
            <div class="category-filters">
                <button class="filter-btn active" data-category="all">
                    <i class="fas fa-border-all"></i> Semua
                </button>
                <button class="filter-btn" data-category="financial">
                    <i class="fas fa-chart-line"></i> Keuangan
                </button>
                <button class="filter-btn" data-category="development">
                    <i class="fas fa-code"></i> Development
                </button>
                <button class="filter-btn" data-category="security">
                    <i class="fas fa-shield-alt"></i> Keamanan
                </button>
                <button class="filter-btn" data-category="utility">
                    <i class="fas fa-wrench"></i> Utility
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <div class="tools-header">
            <div class="tools-header-left">
                <i class="fas fa-th"></i>
                <span>Daftar Tools</span>
                <span class="tools-badge" id="resultCount">6</span>
            </div>
            <div class="tools-header-right">
                <select id="sortSelect" class="sort-select">
                    <option value="name">Urutkan: Nama ↑</option>
                    <option value="name-desc">Urutkan: Nama ↓</option>
                    <option value="category">Urutkan: Kategori</option>
                </select>
            </div>
        </div>

        <div class="tools-grid" id="toolsGrid">
            <!-- Tools akan diisi oleh JavaScript -->
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-card">
                <i class="fas fa-box-open"></i>
                <h3>Tidak ada tools ditemukan</h3>
                <p>Coba dengan kata kunci lain</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-left">
                <i class="fas fa-code-branch"></i>
                <span>FlowKit</span>
            </div>
            <div class="footer-right">
                <div class="footer-stat">
                    <i class="fas fa-database"></i>
                    <span>Total: <strong id="totalToolsFooter">6</strong> tools</span>
                </div>
                <div class="footer-stat">
                    <i class="fas fa-globe"></i>
                    <span>web based</span>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/toolsData.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
